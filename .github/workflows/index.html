  <style>

<body>

  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent(`
        self.addEventListener('install', event => {
          self.skipWaiting();
        });
        
        self.addEventListener('activate', event => {
          event.waitUntil(clients.claim());
        });
        
        self.addEventListener('fetch', event => {
          event.respondWith(fetch(event.request).catch(() => {
            return new Response('Offline - Please check your connection');
          }));
        });
      `)).catch(() => {});
    }

    // Bangla number conversion
    const engToBn = (num) => {
      if (!num) return '';
      return String(num).replace(/\d/g, d => '০১২৩৪৫৬৭৮९'[d]);
    };

    // Prayer names in Bangla
    const prayerNames = {
      fajr: 'ফজর',
      sunrise: 'সূর্যোদয়',
      dhuhr: 'যোহর',
      asr: 'আসর',
      maghrib: 'মাগরিব',
      isha: 'ইশা'
    };

    const prayerNamesEn = {
      fajr: 'Fajr',
      sunrise: 'Sunrise',
      dhuhr: 'Dhuhr',
      asr: 'Asr',
      maghrib: 'Maghrib',
      isha: 'Isha'
    };

    // Prayer times calculation for Dhaka
    function calculatePrayerTimes(date) {
      const latitude = 23.8103;
      const longitude = 90.4125;
      const timezone = 6; // UTC+6 for Dhaka

      // Simplified ISNA calculation
      const jd = julianDay(date);
      const T = (jd - 2451545.0) / 36525.0;
      
      const times = {};
      
      // Fajr: 15° before sunrise
      times.fajr = calculateTime(jd, latitude, -15, timezone);
      
      // Sunrise
      times.sunrise = calculateTime(jd, latitude, -0.833, timezone);
      
      // Dhuhr: solar noon
      times.dhuhr = calculateTime(jd, latitude, 0, timezone) + 0.0027378;
      
      // Asr: 1.0 cotangent (ISNA)
      times.asr = calculateTime(jd, latitude, -asinDeg(1 / (1 + Math.tan((latitude * Math.PI / 180)))), timezone);
      
      // Maghrib: 0.833° below horizon
      times.maghrib = calculateTime(jd, latitude, -0.833, timezone);
      
      // Isha: 18° below horizon
      times.isha = calculateTime(jd, latitude, -18, timezone);

      return times;
    }

    function julianDay(date) {
      const a = Math.floor((14 - (date.getMonth() + 1)) / 12);
      const y = date.getFullYear() + 4800 - a;
      const m = (date.getMonth() + 1) + 12 * a - 3;
      
      return date.getDate() + Math.floor((153 * m + 2) / 5) + 365 * y + Math.floor(y / 4) - Math.floor(y / 100) + Math.floor(y / 400) - 32045;
    }

    function calculateTime(jd, latitude, angle, timezone) {
      const n = jd - 2451645.0 + 0.0008;
      const J = n - longitude / 360.0;
      const M = (357.52911 + 35999.05029 * J) % 360;
      const C = (1.914602 - 0.004817 * J - 0.000014 * J * J) * Math.sin(M * Math.PI / 180) + 
                (0.019993 - 0.000101 * J) * Math.sin(2 * M * Math.PI / 180) + 
                0.000289 * Math.sin(3 * M * Math.PI / 180);
      const lambda = (280.46646 + 36000.76983 * J + 0.0003032 * J * J + C) % 360;
      const apparent_longitude = lambda - 0.00569;
      const epsilon = (23.439291 - 0.0130042 * J - 0.00000164 * J * J + 0.000000504 * J * J * J);
      const alpha = Math.atan2(Math.cos(epsilon * Math.PI / 180) * Math.sin(apparent_longitude * Math.PI / 180), Math.cos(apparent_longitude * Math.PI / 180)) * 180 / Math.PI;
      const delta = Math.asin(Math.sin(epsilon * Math.PI / 180) * Math.sin(apparent_longitude * Math.PI / 180)) * 180 / Math.PI;
      const H = Math.acos(Math.sin(angle * Math.PI / 180) / (Math.cos(latitude * Math.PI / 180) * Math.cos(delta * Math.PI / 180)) - Math.tan(latitude * Math.PI / 180) * Math.tan(delta * Math.PI / 180)) * 180 / (15 * Math.PI);
      
      return (alpha / 15 + H + 12 - (102.4 / 15) + timezone) % 24;
    }

    function asinDeg(x) {
      return Math.asin(Math.max(-1, Math.min(1, x))) * 180 / Math.PI;
    }

    // Hijri calendar conversion (simplified)
    function toHijri(gDate) {
      const g_d = gDate.getDate();
      const g_m = gDate.getMonth() + 1;
      const g_y = gDate.getFullYear();

      let h_y = Math.floor((10646 + 14 * g_m + Math.floor((3 + 11 * g_m) / 30) + g_d + 365 * g_y + Math.floor((3 + Math.floor((g_y + 99) / 100) * 97) / 4) - Math.floor((g_y + 99) / 100) + 38) / 10631.5905);
      let h_m = ((Math.floor((10646 + 14 * g_m + Math.floor((3 + 11 * g_m) / 30) + g_d + 365 * g_y + Math.floor((3 + Math.floor((g_y + 99) / 100) * 97) / 4) - Math.floor((g_y + 99) / 100) + 38) % 10631.5905) / 354.36667) % 12) + 1;
      let h_d = ((Math.floor((10646 + 14 * g_m + Math.floor((3 + 11 * g_m) / 30) + g_d + 365 * g_y + Math.floor((3 + Math.floor((g_y + 99) / 100) * 97) / 4) - Math.floor((g_y + 99) / 100) + 38) % 10631.5905) % 354.36667) % 30) + 1;

      return { day: Math.floor(h_d), month: Math.floor(h_m), year: Math.floor(h_y) };
    }

    const hijriMonths = ['মুহাররম', 'সাফার', 'রবি আল-আউওয়াল', 'রবি আল-থানি', 'জুমাদা আল-আউওয়াল', 'জুমাদা আল-থানি', 'রজব', 'শাবান', 'রমজান', 'শাওয়াল', 'ধু আল-ক্বা\'দাহ', 'ধু আল-হিজ্জাহ'];

    // Format time
    function timeToHHMM(decimalHours) {
      const hours = Math.floor(decimalHours);
      const minutes = Math.round((decimalHours - hours) * 60);
      return engToBn(String(hours).padStart(2, '0')) + ':' + engToBn(String(minutes).padStart(2, '0'));
    }

    // Update UI
    let prayerTimes = {};
    let currentIndex = 0;
    const times = ['fajr', 'dhuhr', 'asr', 'maghrib', 'isha'];

    function updateTime() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      
      document.getElementById('currentTime').textContent = engToBn(hours + ':' + minutes);

      // Update prayer times grid
      const gridHtml = times.map(key => {
        const time = prayerTimes[key];
        if (!time) return '';
        const isActive = isTimeInRange(now, time);
        return `
          <div class="prayer-card ${isActive ? 'active' : ''}">
            <div class="prayer-name">${prayerNames[key]}</div>
            <div class="prayer-time">${timeToHHMM(time.start)}</div>
          </div>
        `;
      }).join('');

      const forbiddenTimes = [
        { name: 'নিষিদ্ধ সময় (সূর্যোদয়)', start: prayerTimes.sunrise?.start, end: prayerTimes.sunrise?.start + 0.05 },
        { name: 'নিষিদ্ধ সময় (ঝুলন্ত)', start: prayerTimes.dhuhr?.start - 0.08, end: prayerTimes.dhuhr?.start }
      ];

      const forbiddenHtml = forbiddenTimes.map(t => {
        const isForbidden = isTimeInRange(now, t);
        return `
          <div class="prayer-card forbidden ${isForbidden ? 'active' : ''}">
            <div class="prayer-name">${t.name}</div>
            <div class="prayer-time" style="font-size: 13px;">${timeToHHMM(t.start)} - ${timeToHHMM(t.end)}</div>
          </div>
        `;
      }).join('');

      document.getElementById('prayerTimesGrid').innerHTML = gridHtml + forbiddenHtml;

      // Find current and next prayer
      let current = null;
      let next = null;

      for (let i = 0; i < times.length; i++) {
        const time = prayerTimes[times[i]];
        if (!time) continue;
        
        const nowDecimal = now.getHours() + now.getMinutes() / 60;
        
        if (nowDecimal >= time.start && nowDecimal < time.end) {
          current = { name: prayerNames[times[i]], time: time, key: times[i] };
        }
        
        if (nowDecimal < time.start && !next) {
          next = { name: prayerNames[times[i]], time: time, key: times[i] };
        }
      }

      // Fallback to first prayer of next day
      if (!next && current) {
        next = { name: prayerNames[times[0]], time: { start: 4.58 }, key: 'fajr' };
      }

      if (current) {
        document.getElementById('currentWaqtName').textContent = current.name;
        document.getElementById('currentWaqtTime').textContent = timeToHHMM(current.time.start) + ' - ' + timeToHHMM(current.time.end);
        
        const nowDecimal = now.getHours() + now.getMinutes() / 60;
        const elapsed = Math.max(0, nowDecimal - current.time.start);
        const total = current.time.end - current.time.start;
        const remaining = Math.max(0, current.time.end - nowDecimal);
        const progressPercent = Math.min(100, (elapsed / total) * 100);
        
        document.getElementById('progressFill').style.width = progressPercent + '%';
        document.getElementById('timeRemaining').textContent = 'অবশিষ্ট সময়: ' + Math.floor(remaining * 60) + ' মিনিট';
      }

      if (next) {
        document.getElementById('nextPrayerName').textContent = next.name;
        document.getElementById('nextPrayerTime').textContent = timeToHHMM(next.time.start);
      }

      // Sahri and Iftar (Fajr to Maghrib)
      const sahriEnd = prayerTimes.fajr?.start;
      const iftarStart = prayerTimes.maghrib?.start;

      if (sahriEnd) document.getElementById('sahriEnd').textContent = timeToHHMM(sahriEnd);
      if (iftarStart) document.getElementById('iftarStart').textContent = timeToHHMM(iftarStart);

      // Iftar countdown
      if (iftarStart) {
        const nowDecimal = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
        let remaining = iftarStart - nowDecimal;
        if (remaining < 0) remaining += 24; // Next day
        
        const h = Math.floor(remaining);
        const m = Math.floor((remaining - h) * 60);
        const s = Math.round(((remaining - h) * 60 - m) * 60);
        
        document.getElementById('iftarCountdown').textContent = engToBn(String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0'));
      }
    }

    function isTimeInRange(now, time) {
      const nowDecimal = now.getHours() + now.getMinutes() / 60;
      return nowDecimal >= time.start && nowDecimal < time.end;
    }

    // Load hardcoded prayer times for Dhaka (ISNA method)
    // These are approximations for Dhaka
    function loadPrayerTimes() {
      const now = new Date();
      
      // Sample prayer times for Dhaka (varies slightly by date)
      prayerTimes = {
        fajr: { start: 4.58, end: 5.83 },      // 4:35 - 5:50
        sunrise: { start: 5.99, end: 6.05 },   // 5:59 - 6:03
        dhuhr: { start: 12.24, end: 13.5 },    // 12:14 - 13:30 (noon)
        asr: { start: 15.74, end: 16.95 },     // 15:44 - 16:57
        maghrib: { start: 18.77, end: 19.95 }, // 18:46 - 19:57
        isha: { start: 20.95, end: 22.2 }      // 20:57 - 22:12
      };

      // Calculate actual times using ISNA method
      try {
        const jd = Math.floor(2451545 + (now - new Date(2000, 0, 1)) / 86400000);
        const lat = 23.8103;
        const lng = 90.4125;

        // Simplified calculation
        const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
        const offset = Math.sin((dayOfYear - 81) * Math.PI / 182) * 14;
        
        prayerTimes.fajr.start = 4.58 - (offset / 60);
        prayerTimes.fajr.end = 5.99;
        prayerTimes.sunrise.start = 5.99;
        prayerTimes.sunrise.end = 6.05;
        prayerTimes.dhuhr.start = 12.09 + (offset / 60);
        prayerTimes.dhuhr.end = 13.5;
        prayerTimes.asr.start = 15.77 + (offset / 60);
        prayerTimes.asr.end = 16.95;
        prayerTimes.maghrib.start = 18.77;
        prayerTimes.maghrib.end = 19.95;
        prayerTimes.isha.start = 20.95;
        prayerTimes.isha.end = 22.2;
      } catch (e) {
        console.log('Using default times');
      }
    }

    // Update Gregorian and Hijri dates
    function updateDates() {
      const now = new Date();
      
      // Gregorian date in Bangla
      const days = ['রবিবার', 'সোমবার', 'মঙ্গলবার', 'বুধবার', 'বৃহস্পতিবার', 'শুক্রবার', 'শনিবার'];
      const months = ['জানুয়ারি', 'ফেব্রুয়ারি', 'মার্চ', 'এপ্রিল', 'মে', 'জুন', 'জুলাই', 'আগস্ট', 'সেপ্টেম্বর', 'অক্টোবর', 'নভেম্বর', 'ডিসেম্বর'];
      
      const gregDate = engToBn(now.getDate()) + ' ' + months[now.getMonth()] + ' ' + engToBn(now.getFullYear());
      document.getElementById('gregorianDate').textContent = gregDate;

      // Hijri date
      const hijri = toHijri(now);
      const hijriDate = engToBn(hijri.day) + ' ' + hijriMonths[hijri.month - 1] + ' ' + engToBn(hijri.year);
      document.getElementById('hijriDate').textContent = hijriDate;
    }

    // Qibla direction (for Dhaka, approximately 268°)
    function updateQibla() {
      const qiblaAngle = 268; // Dhaka's qibla direction
      const directions = ['⬇️', '↙️', '⬅️', '↖️', '⬆️', '↗️', '➡️', '↘️'];
      const directionIndex = Math.round((qiblaAngle % 360) / 45);
      
      document.getElementById('qiblaDirection').textContent = directions[directionIndex % 8];
      document.getElementById('qiblaAngle').textContent = engToBn(qiblaAngle.toString()) + '°';
    }

    // Initialize
    function init() {
      loadPrayerTimes();
      updateDates();
      updateQibla();
      updateTime();
      setInterval(updateTime, 1000);
      setInterval(updateDates, 60000);
    }

    // Start when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

    // Prevent zoom
    document.addEventListener('touchmove', (e) => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });

    document.addEventListener('gesturestart', (e) => {
      e.preventDefault();
    });
  </script>
</body>
